version: '3.8'

services:
  tech-enablement-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tech-enablement-hub
    ports:
      - "3000:5000"  # Map host:container (Access at http://localhost:3000)
    volumes:
      # Mount credentials for Google Sheets (optional - add when ready)
      - ./server/credentials.json:/app/server/credentials.json:ro
      # Persist data and uploads
      - tech-data:/app/server/data
      - tech-uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - tech-network

  # Optional: Add a simple nginx for serving static files (advanced)
  # Uncomment if needed
  # nginx:
  #   image: nginx:alpine
  #   container_name: tech-enablement-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - tech-enablement-hub
  #   networks:
  #     - tech-network

volumes:
  tech-data:
    driver: local
  tech-uploads:
    driver: local

networks:
  tech-network:
    driver: bridge
